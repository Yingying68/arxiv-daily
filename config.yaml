# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "Yingying68"
repo_name: "arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 20

publish_readme: True
publish_gitpage: True
publish_wechat: False #

# file paths
json_readme_path: './docs/arxiv-daily.json'
json_gitpage_path: './docs/arxiv-daily-web.json'
json_wechat_path: './docs/arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# keywords to search
# topics: task/technique/dataset...
keywords:
    "Phase Change Materials": 
        filters: ["Thermal management",
                  "Flexible thermal management",
                  "Phase change thermal management"
                 ]
    "Thermal Management":
        filters: ["Thermal management",
                  "Flexible thermal management",
                  "Phase change thermal management"
                 ]
    "Temperature-Responsive Systems":
        filters: ["Temperature-responsive systems",
                  "Temperature-responsive fluorescence",
                  "Thermochromic warning systems"
                  ]
    "Multifunctional Composite Materials":
        filters: ["Multifunctional composite materials",
                  "Flexible composite films",
                  "Phase change composite materials"
                  ]
    
